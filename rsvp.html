<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSVP</title>

  <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: white;
      color: #111;
      font-family: 'Cormorant Garamond', serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .page {
      width: min(1000px, 92vw);
      padding: 70px 20px 80px;
      text-align: center;
    }

    .back-arrow {
      position: fixed;
      top: 22px;
      left: 22px;
      text-decoration: none;
      color: rgba(0, 0, 0, 0.65);
      font-size: 1.8rem;
      line-height: 1;
      z-index: 100;
      transition: transform 0.15s ease, color 0.15s ease, opacity 0.15s ease;
      opacity: 0.75;
      font-family: serif;
    }

    .back-arrow:hover {
      transform: translateX(-3px);
      color: rgba(0, 0, 0, 0.95);
      opacity: 1;
    }

    .intro {
      font-size: 1.25rem;
      font-style: italic;
      margin-bottom: 20px;
    }

    .subtext {
      font-size: 1.08rem;
      line-height: 1.7;
      font-style: italic;
      max-width: 760px;
      margin: 0 auto 34px;
    }

    .form-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    iframe {
      width: 100%;
      max-width: 900px;
      height: 1250px;
      border: none;
    }

    @media (max-width: 600px) {
      .back-arrow {
        top: 18px;
        left: 18px;
        font-size: 1.6rem;
      }

      .page {
        padding: 70px 12px 60px;
      }

      .intro {
        font-size: 1.15rem;
        margin-bottom: 18px;
      }

      .subtext {
        font-size: 1rem;
        margin-bottom: 24px;
      }

      iframe {
        height: 1400px;
      }
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-arrow" aria-label="Go back">←</a>

  <div class="page">
    <p class="intro">RSVP</p>
    <p class="subtext">
      Please RSVP using the form below.
    </p>

    <div class="form-wrap">
      <iframe
        src="https://docs.google.com/forms/d/e/1FAIpQLSfQaeIDFJxX7nnDNOzcKEiSiPwTU9y8U3QgDFF5Dhq4auE6qw/viewform"
        loading="lazy"
      >
        Loading…
      </iframe>
    </div>
  </div>

</body>
</html>
